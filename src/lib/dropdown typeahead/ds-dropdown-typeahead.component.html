<div class="input">
  <div class="input-label">
    <label [for]="id" class="form-label">{{ label }}</label>

    @if (assistiveText) {
      <small class="form-helper">{{ assistiveText }}</small>
    }
  </div>

  <div class="response dropdown-input">
    <div [class]="dropdownClasses.join(' ')">
      <input
        type="text"
        class="dropdown-toggle"
        [id]="id"
        [value]="query"
        [placeholder]="placeholder"
        [disabled]="disabled || readonly"
        [attr.aria-expanded]="open"
        (click)="$event.stopPropagation()"
        (focus)="onFocus($event)"
        (input)="onInput($event)" />

      @if (query) {
        <button
          type="button"
          class="input-btn input-clear"
          aria-label="Clear"
          (click)="clear($event)"></button>
      }

      <ul
        class="dropdown-menu dropdown-menu-panel"
        role="menu"
        [class.show]="open"
        [attr.aria-labelledby]="id"
        (click)="$event.stopPropagation()">
        @for (option of filteredOptions; track option.value; let index = $index) {
          <li
            [id]="id + '-option-' + (index + 1)"
            class="dropdown-item"
            role="option"
            [attr.aria-label]="option.label"
            [attr.aria-selected]="option.value === value"
            tabindex="0"
            (click)="selectOption(option, $event)"
            (keydown)="onOptionKeydown($event, option)">
            {{ option.label }}
          </li>
        }
      </ul>
    </div>
  </div>

  @if (helperText) {
    <small class="form-helper">{{ helperText }}</small>
  }
</div>
