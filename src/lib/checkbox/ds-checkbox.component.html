<div class="form-check">
  <input
    class="form-check-input"
    [class.is-invalid]="invalid"
    type="checkbox"
    [id]="id"
    [attr.name]="name || null"
    [value]="value"
    [checked]="checked"
    [disabled]="disabled"
    [indeterminate]="indeterminate"
    [required]="required"
    [attr.readonly]="readonly ? '' : null"
    (click)="onClick($event)"
    (keydown)="onKeydown($event)"
  />
  <label class="form-check-label" [for]="id">
    {{ label }}
  </label>
</div>
