<div class="form-check">
  <input
    class="form-check-input"
    type="radio"
    [name]="name"
    [id]="id"
    [value]="value"
    [checked]="checked"
    [disabled]="disabled"
    [attr.readonly]="readonly ? '' : null"
  >
  <label class="form-check-label" [for]="id">
    {{ label }}
  </label>
</div>
