<div
  [class]="classes"
  role="alert"
>
  <div class="alert-content">

    <!-- Icon -->
    <span
      class="alert-icon"
      *ngIf="icon"
    >
      <i
        [class]="iconClass"
        aria-hidden="true"
      ></i>
    </span>

    <div class="alert-body">

      <div class="alert-message">
        <h6>{{ message }}</h6>
      </div>

      <!-- Alert Note -->
      <div
        class="alert-note"
        *ngIf="hasNote"
      >
        {{ note }}

        <p *ngIf="noteSmall">
          <small>{{ noteSmall }}</small>
        </p>
      </div>

      <!-- Context bar -->
      <div
        class="alert-contextbar"
        *ngIf="hasContext"
      >
        <ng-content select="[alert-context]"></ng-content>
      </div>

    </div>
  </div>

    <!-- Close button -->
    <button
      *ngIf="dismissible"
      type="button"
      class="btn-close"
      data-bs-dismiss="alert"
      aria-label="Close"
      (click)="onDismiss()"
    ></button>

</div>
