<!-- Clickable variant -->
<a
  *ngIf="isClickable; else nonClickable"
  [href]="href"
  [class]="classes"
>

  <!-- Optional image -->
  <img
    *ngIf="imgSrc"
    [src]="imgSrc"
    class="card-img"
    [alt]="imgAlt || ''"
  />

  <div class="card-body">
    <ng-content></ng-content>
  </div>

</a>

<!-- Non-clickable variants -->
<ng-template #nonClickable>

  <div [class]="classes">

    <!-- Selectable input -->
    <input
      *ngIf="isSelectable"
      class="form-check-input"
      [type]="inputType"
      [name]="name"
      [value]="value"
      [checked]="checked"
    />

    <!-- Optional image -->
    <img
      *ngIf="imgSrc"
      [src]="imgSrc"
      class="card-img"
      [alt]="imgAlt || ''"
    />

    <div class="card-body">
      <ng-content></ng-content>
    </div>

  </div>

</ng-template>
