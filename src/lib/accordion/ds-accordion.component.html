<div [class]="getAccordionClasses().join(' ')" [id]="accordionId">
  @for (item of items; track $index) {
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button
          [class]="isExpanded($index) ? 'accordion-button' : 'accordion-button collapsed'"
          type="button"
          data-bs-toggle="collapse"
          [attr.data-bs-target]="'#' + getCollapseId($index)"
          [attr.aria-expanded]="isExpanded($index)"
          [attr.aria-controls]="getCollapseId($index)"
          (click)="toggleItem($index)">
          {{ item.heading }}
        </button>
      </h2>

      <div
        [id]="getCollapseId($index)"
        [class]="isExpanded($index) ? 'accordion-collapse collapse show' : 'accordion-collapse collapse'"
        [attr.data-bs-parent]="singleExpand ? '#' + accordionId : null">
        <div class="accordion-body">
          <div class="text-block" [innerHTML]="item.bodyHtml"></div>
        </div>
      </div>
    </div>
  }
</div>
