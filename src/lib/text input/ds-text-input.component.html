<div class="input">
  <div class="input-label">
    <label [for]="id" class="form-label">
      {{ label }}
      @if (labelMeta) {
        <small>({{ labelMeta }})</small>
      }
    </label>

    @if (assistiveText) {
      <small class="form-helper">
        {{ assistiveText }}
      </small>
    }
  </div>

  <div class="response text-input">
    @if (showIcon) {
      <i class="input-icon {{ iconClass }}" aria-hidden="true"></i>
    }

    <input
      [type]="type"
      [class]="inputClasses"
      [id]="id"
      [value]="value"
      [placeholder]="placeholder"
      [required]="required"
      [disabled]="disabled"
      [readOnly]="readonly"
    >

    @if (showActionButton) {
      <button type="button" class="input-btn" [attr.aria-label]="actionAriaLabel || null">
        <i class="{{ actionIconClass }}" aria-hidden="true"></i>
      </button>
    }

    @if (showClear) {
      <button type="button" class="input-btn input-clear" aria-label="Clear"></button>
    }
  </div>

  @if (helperText) {
    <small class="form-helper">
      {{ helperText }}
    </small>
  }

  @if (validationMessage) {
    <div class="invalid-feedback">
      {{ validationMessage }}
    </div>
  }
</div>
