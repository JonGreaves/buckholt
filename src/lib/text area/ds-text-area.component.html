<div class="input">
  <div class="input-label">
    <label [for]="id" class="form-label">{{ label }}</label>

    @if (assistiveText) {
      <small class="form-helper">
        {{ assistiveText }}
      </small>
    }
  </div>

  <div class="response textarea-input">
    <textarea
      class="form-control"
      [class.is-invalid]="isInvalid"
      [id]="id"
      [attr.name]="name || null"
      [attr.rows]="rows"
      [attr.maxlength]="maxlength ?? null"
      [attr.placeholder]="placeholder || null"
      [disabled]="disabled"
      [readOnly]="readonly"
      [value]="value"
    ></textarea>

    @if (showCounter && maxlength) {
      <div class="counter">
        <span class="counting">{{ currentCount }}</span> / {{ maxlength }}
      </div>
    }
  </div>

  @if (helperText) {
    <small class="form-helper">
      {{ helperText }}
    </small>
  }

  @if (validationMessage) {
    <div class="invalid-feedback">
      {{ validationMessage }}
    </div>
  }
</div>
